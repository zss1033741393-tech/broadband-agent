# LLM 配置：所有 LLM 参数统一在此管理
# api_key 优先读本文件，未填时自动 fallback 到环境变量 LLM_API_KEY
default:
  api_key: ""                              # 填入 API Key；留空则从环境变量 LLM_API_KEY 读取
  base_url: "https://api.openai.com/v1"   # 对接内部模型时修改此地址
  model: "gpt-4o"
  temperature: 0.7
  max_tokens: 4096

stages:
  stage1_intent:
    model: "gpt-4o"
    temperature: 0.7
    max_tokens: 4096

  stage2_plan:
    model: "gpt-4o-mini"
    temperature: 0.3
    max_tokens: 2048

  stage3_constraint:
    model: "gpt-4o-mini"
    temperature: 0.1
    max_tokens: 2048

  stage4_config:
    model: "gpt-4o"
    temperature: 0.2
    max_tokens: 4096
