# 运行参数配置

pipeline:
  max_skill_rounds: 20              # Agent 最大 Skill 调用轮次（防止死循环）
  plan_filling_parallel: true       # 方案填充是否并行
  max_retry_on_constraint_fail: 3   # 约束校验失败最大回退次数

storage:
  sqlite_db_path: "./data/agent.db"
  traces_dir: "./traces"
  outputs_dir: "./outputs"

server:
  host: "0.0.0.0"
  port: 8000
  reload: true
