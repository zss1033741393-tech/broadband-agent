pipeline:
  max_turns: 15
  max_retry_on_constraint_fail: 3
  num_history_runs: 10
  skills_dir: "./skills"
  debug_mode: true
  # reasoning: 仅在使用原生推理模型时开启（OpenAI o1/o3、deepseek-reasoner）
  # 普通 OpenAI 兼容模型（qwen、gpt-4o 等）必须设为 false，
  # 否则 Agno 会发送 role=developer 导致 400 错误
  reasoning: false
  clarification_max_rounds: 3
  clarification_max_fields_per_round: 3

storage:
  sqlite_db_path: "./data/agent.db"
  sqlite_table: "agent_sessions"
  lancedb_uri: "./data/lancedb"
  lancedb_table: "domain_knowledge"

logging:
  level: "DEBUG"
