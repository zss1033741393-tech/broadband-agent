pipeline:
  max_turns: 15
  max_iterations: 20            # coordinate 模式最大迭代次数（委派次数上限）
  max_retry_on_constraint_fail: 3
  num_history_runs: 4           # 主控 OrchestratorTeam 的历史轮数
  skills_dir: "./skills"
  debug_mode: true
  clarification_max_rounds: 3
  clarification_max_fields_per_round: 3
  tool_timeout_sec: 30             # 单个工具超时（秒），超时返回 error 不阻塞
  agents:
    intent:
      num_history_runs: 4
      model: ~                  # null = 继承 llm.yaml 中的模型
    plan:
      num_history_runs: 2
      model: ~
    constraint:
      num_history_runs: 2
      model: ~
    config:
      num_history_runs: 1
      model: ~

storage:
  sqlite_db_path: "./data/agent.db"
  sqlite_table: "agent_sessions"
  lancedb_uri: "./data/lancedb"
  lancedb_table: "domain_knowledge"

logging:
  level: "DEBUG"
