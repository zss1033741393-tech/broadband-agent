pipeline:
  max_turns: 15
  max_retry_on_constraint_fail: 3
  num_history_runs: 4
  skills_dir: "./skills"
  debug_mode: true
  clarification_max_rounds: 3
  clarification_max_fields_per_round: 3

storage:
  sqlite_db_path: "./data/agent.db"
  sqlite_table: "agent_sessions"
  lancedb_uri: "./data/lancedb"
  lancedb_table: "domain_knowledge"

logging:
  level: "DEBUG"
