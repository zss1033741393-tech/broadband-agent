version: 1
disable_existing_loggers: false

formatters:
  standard:
    format: "[%(asctime)s] [%(stage)s] [%(component)s] [%(levelname)s] %(message)s"
    datefmt: "%Y-%m-%d %H:%M:%S"
  simple:
    format: "[%(levelname)s] %(message)s"

handlers:
  console:
    class: logging.StreamHandler
    formatter: simple
    stream: ext://sys.stdout
  app_file:
    class: logging.handlers.RotatingFileHandler
    formatter: standard
    filename: logs/app.log
    maxBytes: 10485760
    backupCount: 3
    encoding: utf-8
  pipeline_file:
    class: logging.handlers.RotatingFileHandler
    formatter: standard
    filename: logs/pipeline.log
    maxBytes: 10485760
    backupCount: 5
    encoding: utf-8

loggers:
  app:
    level: INFO
    handlers: [console, app_file]
    propagate: false
  pipeline:
    level: DEBUG
    handlers: [console, pipeline_file]
    propagate: false

root:
  level: WARNING
  handlers: [console]
